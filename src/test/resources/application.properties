spring.datasource.url=jdbc:h2:mem:zizu-test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true
app.jwt.secret=zizu-test-secret-key-zizu-test-secret
app.jwt.access-token-minutes=15
app.jwt.refresh-token-days=7
app.signature.keystore-location=classpath:test-signature.p12
app.signature.keystore-type=PKCS12
app.signature.keystore-password=testpass
app.signature.key-alias=test-signature
app.signature.key-password=testpass

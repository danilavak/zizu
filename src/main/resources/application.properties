spring.application.name=zizu
server.port=${SERVER_PORT:8080}
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/zizu}
spring.datasource.username=${DB_USERNAME:zizu}
spring.datasource.password=${DB_PASSWORD:zizu}
spring.datasource.driver-class-name=${DB_DRIVER:org.postgresql.Driver}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.info.env.enabled=true

server.forward-headers-strategy=framework
server.ssl.enabled=${SERVER_SSL_ENABLED:false}
server.ssl.key-store=${SERVER_SSL_KEY_STORE:}
server.ssl.key-store-password=${SERVER_SSL_KEY_STORE_PASSWORD:}
server.ssl.key-store-type=${SERVER_SSL_KEY_STORE_TYPE:PKCS12}
server.ssl.key-alias=${SERVER_SSL_KEY_ALIAS:}

app.jwt.secret=${JWT_SECRET:zizu-secret-key-zizu-secret-key-2026}
app.jwt.access-token-minutes=${JWT_ACCESS_TOKEN_MINUTES:15}
app.jwt.refresh-token-days=${JWT_REFRESH_TOKEN_DAYS:7}
app.license.ticket-lifetime-seconds=${LICENSE_TICKET_LIFETIME_SECONDS:300}

app.signature.keystore-base64=${SIGNATURE_KEYSTORE_BASE64:}
app.signature.keystore-location=${SIGNATURE_KEYSTORE_LOCATION:}
app.signature.keystore-type=${SIGNATURE_KEYSTORE_TYPE:PKCS12}
app.signature.keystore-password=${SIGNATURE_KEYSTORE_PASSWORD:}
app.signature.key-alias=${SIGNATURE_KEY_ALIAS:}
app.signature.key-password=${SIGNATURE_KEY_PASSWORD:}
app.binary-api.student-surname=${BINARY_API_STUDENT_SURNAME:VAK}
app.binary-api.version=${BINARY_API_VERSION:1}
app.object-storage.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
app.object-storage.access-key=${MINIO_ACCESS_KEY:zizu-app}
app.object-storage.secret-key=${MINIO_SECRET_KEY:zizu-app-secret}
app.object-storage.bucket=${MINIO_BUCKET:signature-files}
app.object-storage.region=${MINIO_REGION:us-east-1}
app.object-storage.presigned-expiry-minutes=${MINIO_PRESIGNED_EXPIRY_MINUTES:30}
app.signature-files.first-bytes-count=${SIGNATURE_FILE_FIRST_BYTES_COUNT:16}

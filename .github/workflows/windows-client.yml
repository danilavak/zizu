name: Windows Client

on:
  pull_request:
    branches:
      - main
    paths:
      - windows-client/**
      - .github/workflows/windows-client.yml
  push:
    branches:
      - main
    paths:
      - windows-client/**
      - .github/workflows/windows-client.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: windows-client-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build_windows_client:
    runs-on: windows-latest
    steps:
      - name: Получить код
        uses: actions/checkout@v4

      - name: Подключить MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Подключить NuGet
        uses: NuGet/setup-nuget@v2

      - name: Восстановить пакеты
        run: nuget restore windows-client\packages.config -PackagesDirectory windows-client\packages

      - name: Собрать клиент
        run: msbuild windows-client\zizu-windows-client.vcxproj /p:Configuration=Release /p:Platform=x64 /m

      - name: Подготовить артефакт
        shell: powershell
        run: |
          $artifactDir = "windows-client-artifact"
          Remove-Item $artifactDir -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $artifactDir | Out-Null
          Copy-Item windows-client\x64\Release\* $artifactDir -Recurse -Force

      - name: Загрузить артефакт
        uses: actions/upload-artifact@v4
        with:
          name: windows-client-exe
          path: windows-client-artifact

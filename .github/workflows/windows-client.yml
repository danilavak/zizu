name: Windows Client

on:
  push:
    branches:
      - main
    paths:
      - "windows-client/**"
      - ".github/workflows/windows-client.yml"
  pull_request:
    branches:
      - main
    paths:
      - "windows-client/**"
      - ".github/workflows/windows-client.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: windows-client-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build_windows_client:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
        working-directory: windows-client
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: "3.31.6"

      - name: Configure
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: cmake --build build --config Release

      - name: Prepare artifact
        run: |
          New-Item -ItemType Directory -Force -Path artifact | Out-Null
          Copy-Item build\Release\zizu-windows-client.exe artifact\

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zizu-windows-client
          path: windows-client/artifact/zizu-windows-client.exe
